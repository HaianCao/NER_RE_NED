# ============================================================
# NER + RE Pipeline — Default Configuration
# ============================================================
# Edit this file to control every aspect of the experiment.
# Run:
#   accelerate launch --multi_gpu --num_processes=2 train.py \
#       --config configs/default.yaml

# ── Model ────────────────────────────────────────────────────
model:
  # Unsloth-optimised instruct model (4-bit quantised)
  # Options:
  #   "unsloth/Phi-3-mini-4k-instruct-bnb-4bit"   ← fast, low VRAM
  #   "unsloth/llama-3-8b-Instruct-bnb-4bit"      ← higher accuracy
  #   "unsloth/mistral-7b-instruct-v0.2-bnb-4bit"
  name: "unsloth/Phi-3-mini-4k-instruct-bnb-4bit"
  max_seq_length: 1024
  seed: 42

# ── LoRA ─────────────────────────────────────────────────────
lora:
  r: 16
  alpha: 16
  dropout: 0.0     # Unsloth recommends 0.0 for maximum speed
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

# ── Training ─────────────────────────────────────────────────
training:
  # Training format:
  #   "causal"      → plain text "input\n\n### Output:\n{json}"  (base models)
  #   "instruction" → ChatML System/User/Assistant               (instruct models)
  format: "instruction"

  # Task:
  #   "ner_only" → NER extraction only
  #   "re_only"  → Relation extraction only (entities provided)
  #   "joint"    → NER + RE in a single output
  task_mode: "joint"

  # RE granularity (ignored when task_mode=ner_only):
  #   "pairwise" → 1 sample per entity pair  (better F1, more samples)
  #   "global"   → 1 sample per sentence     (faster inference, natural for JOINT)
  re_mode: "global"

  batch_size: 8
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  epochs: 3
  weight_decay: 0.01
  warmup_ratio: 0.1
  output_dir: "/kaggle/working/outputs"
  logging_steps: 10
  eval_steps: 50
  save_steps: 50
  
  # Fraction (0.2) or exact number (500) of eval samples to run during training
  eval_subset_size: 0.2

# ── Data ─────────────────────────────────────────────────────
# Each entry:
#   path:     absolute path to the JSONL file
#   language: "auto" (detect from JSONL keys) | "en" | "vi"
data:
  train_files:
    - path: "/kaggle/input/n2c2-eng/n2c2_2010_train_en.jsonl"
      language: "auto"
    - path: "/kaggle/input/n2c2-eng/n2c2_2010_train_vi.jsonl"
      language: "auto"
  eval_files:
    - path: "/kaggle/input/n2c2-eng/n2c2_2010_test_en.jsonl"
      language: "auto"
    - path: "/kaggle/input/n2c2-eng/n2c2_2010_test_vi.jsonl"
      language: "auto"

# ── Labels ───────────────────────────────────────────────────
# These definitions are embedded directly into the prompts so the
# model learns the semantic meaning of each label, not just the name.
labels:
  entities:
    Problem:   "Health issues including diseases, symptoms, disorders, or injuries"
    Treatment: "Medical interventions including medications, surgeries, therapies, or devices"
    Test:      "Clinical measurements including lab tests, imaging studies, or examinations"

  relations:
    TrIP:  "Treatment Improves Problem"
    TrWP:  "Treatment Worsens Problem"
    TrCP:  "Treatment Causes Problem"
    TrAP:  "Treatment Administered for Problem"
    TrNAP: "Treatment Not Administered because of Problem"
    TeRP:  "Test Reveals Problem"
    TeCP:  "Test Conducted because of Problem"
    PIP:   "Problem Indicates Problem"

  # Allowed (subject_label, object_label) pairs — used for PAIRWISE RE
  # to filter entity pairs that can logically have a clinical relation.
  valid_pairs:
    - [Treatment, Problem]
    - [Test,      Problem]
    - [Problem,   Problem]
